<head>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#1f4037,#99f2c8);
    color:white;
}

/* Navbar */
.navbar {
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#000000cc;
}
.navbar a {
    color:white;
    margin:0 10px;
    text-decoration:none;
    font-weight:bold;
}

/* Container */
.container {
    max-width:600px;
    margin:40px auto;
    background:#000000aa;
    padding:25px;

.option {
    display:block;
    margin:10px;
    padding:10px;
    background:#222;
    border-radius:10px;
    cursor:pointer;
}
.option:hover {
    background:#333;
}

button {
    padding:12px 20px;
    background:#00ffcc;
    border:none;

    cursor:pointer;
    font-weight:bold;
}

/* Result */

    margin-top:15px;
}

/* Ads */
.ad-box {
    margin:15px 0;
    padding:10px;
    background:#111;
    border-radius:10px;
}

/* Footer */
.footer {
    text-align:center;
    padding:15px;
    background:#000000cc;
    margin-top:30px;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
<div><b>ViralTools 🔥</b></div>
<div>
<a href="index.html">Home</a>
<a href="tools.html">Tools</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</div>
</div>

<div class="container">

<h1>🧠 IQ Test</h1>
<p>Answer simple questions to test your intelligence</p>

<!-- 🔥 Adsterra Top -->
<div class="ad-box">
<p>Ad Space</p>
</div>

<div id="quiz">
<div class="question" id="question">Click start to begin</div>
<div id="options"></div>
<button onclick="startQuiz()">Start Test 🚀</button>
</div>

<div class="loader" id="loader">Analyzing your IQ... ⏳</div>

<div class="result" id="result"></div>

<!-- 🔥 Monetag Unlock -->
<div class="ad-box">
<button onclick="goAd()">Unlock Full IQ Report 🔥</button>
</div>

<!-- 🔥 Adsterra Bottom -->
<div class="ad-box">
<p>Ad Space</p>
</div>

</div>

<div class="footer">
<p>© 2026 ViralTools | All Rights Reserved</p>
</div>

<script>
let questions = [
{q:"What comes next: 2, 4, 8, 16, ?", options:["18","24","32","20"], ans:2},
{q:"Which number is smallest?", options:["0.1","0.01","0.001","0.0001"], ans:3},
{q:"Find odd one: Apple, Banana, Carrot, Mango", options:["Apple","Banana","Carrot","Mango"], ans:2},
{q:"5 + 3 x 2 = ?", options:["16","11","10","13"], ans:1},
{q:"Which shape has 3 sides?", options:["Square","Triangle","Circle","Rectangle"], ans:1}
];

let index = 0;
let score = 0;

function startQuiz(){
    index = 0;
    score = 0;
    loadQuestion();
}

function loadQuestion(){
    if(index >= questions.length){
        finishQuiz();
        return;
    }

    let q = questions[index];
    document.getElementById("question").innerText = q.q;

    let optHTML="";
    q.options.forEach((opt,i)=>{
        optHTML += `<div class="option" onclick="select(${i})">${opt}</div>`;
    });

    document.getElementById("options").innerHTML = optHTML;
}

function select(i){
    if(i === questions[index].ans){
        score++;
    }
    index++;
    loadQuestion();
}

function finishQuiz(){
    document.getElementById("options").innerHTML="";
    document.getElementById("loader").style.display="block";

    setTimeout(()=>{
        document.getElementById("loader").style.display="none";

        let iq = 80 + (score * 10);

        let msg="";
        if(iq > 120) msg="Genius Level 🧠🔥";
        else if(iq > 100) msg="Above Average 👍";
        else msg="Normal Intelligence 😊";

        document.getElementById("result").innerHTML =
        "Your IQ Score: <b>"+iq+"</b><br>"+msg;

    },2500);
}

/* 🔥 Monetag Redirect */
function goAd(){
    window.location.href="YOUR_MONETAG_LINK";
}
</script>

</body>
