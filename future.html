<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Predictor 🔮 | Viral Tools</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#141e30,#243b55);
    color:white;
}

/* Navbar */
.navbar {
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#000000cc;
}
.navbar a {
    color:white;
    margin:0 10px;
    text-decoration:none;
    font-weight:bold;
}

/* Container */
.container {
    max-width:500px;
    margin:40px auto;
    background:#000000aa;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1 {
    margin-bottom:10px;
}

/* Input */
input {
    width:90%;
    padding:12px;
    margin:10px;
    border-radius:10px;
    border:none;
}

/* Button */
button {
    padding:12px 20px;
    background:#00ffcc;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

button:hover {
    background:#00e6b8;
}

/* Result */
.result {
    margin-top:20px;
    font-size:20px;
    color:#00ffcc;
}

/* Loader */
.loader {
    display:none;
    margin-top:15px;
}

/* Ad box */
.ad-box {
    margin:15px 0;
    padding:10px;
    background:#111;
    border-radius:10px;
}

/* Footer */
.footer {
    text-align:center;
    padding:15px;
    background:#000000cc;
    margin-top:30px;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
<div><b>ViralTools 🔥</b></div>
<div>
<a href="index.html">Home</a>
<a href="tools.html">Tools</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</div>
</div>

<div class="container">

<h1>🔮 Future Predictor</h1>
<p>Enter your name and discover your future instantly</p>

<!-- 🔥 Adsterra Top -->
<div class="ad-box">
<!-- Paste Adsterra Banner Code -->
<p>Ad Space</p>
</div>

<input type="text" id="name" placeholder="Enter Your Name">

<button onclick="predictFuture()">Check Future 🚀</button>

<div class="loader" id="loader">Analyzing your destiny... ⏳</div>

<div class="result" id="result"></div>

<!-- 🔥 Monetag Unlock -->
<div class="ad-box">
<button onclick="goAd()">Unlock Full Prediction 🔥</button>
</div>

<!-- 🔥 Adsterra Bottom -->
<div class="ad-box">
<!-- Paste Adsterra Native / Social Bar -->
<p>Ad Space</p>
</div>

</div>

<div class="footer">
<p>© 2026 ViralTools | All Rights Reserved</p>
</div>

<script>
function predictFuture(){
    let name = document.getElementById("name").value;

    if(name===""){
        alert("Please enter your name!");
        return;
    }

    document.getElementById("loader").style.display="block";

    setTimeout(()=>{
        document.getElementById("loader").style.display="none";

        let predictions = [
            "You will become very rich soon 💰",
            "A big surprise is coming in your life 😱",
            "You will travel abroad ✈️",
            "You will achieve huge success 🔥",
            "Someone special will enter your life ❤️",
            "A golden opportunity is waiting 🚀",
            "Your luck will change very soon 🍀"
        ];

        let result = predictions[Math.floor(Math.random()*predictions.length)];

        document.getElementById("result").innerHTML =
        "Hello <b>"+name+"</b> 👋<br><br>" +
        result;
    },2500);
}

/* 🔥 Monetag Redirect */
function goAd(){
    window.location.href="YOUR_MONETAG_LINK";
}
</script>

</body>
</html>
