<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Calculator 🎂 | Viral Tools</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff7e5f,#feb47b);
    color:white;
}

/* Navbar */
.navbar {
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#000000cc;
}
.navbar a {
    color:white;
    margin:0 10px;
    text-decoration:none;
    font-weight:bold;
}

/* Container */
.container {
    max-width:500px;
    margin:40px auto;
    background:#000000aa;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1 {
    margin-bottom:10px;
}

/* Input */
input {
    width:90%;
    padding:12px;
    margin:10px;
    border-radius:10px;
    border:none;
}

/* Button */
button {
    padding:12px 20px;
    background:#00ffcc;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

button:hover {
    background:#00e6b8;
}

/* Result */
.result {
    margin-top:20px;
    font-size:18px;
    color:#00ffcc;
}

/* Loader */
.loader {
    display:none;
    margin-top:15px;
}

/* Ad box */
.ad-box {
    margin:15px 0;
    padding:10px;
    background:#111;
    border-radius:10px;
}

/* Footer */
.footer {
    text-align:center;
    padding:15px;
    background:#000000cc;
    margin-top:30px;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
<div><b>ViralTools 🔥</b></div>
<div>
<a href="index.html">Home</a>
<a href="tools.html">Tools</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</div>
</div>

<div class="container">

<h1>🎂 Age Calculator</h1>
<p>Enter your birthdate to calculate your exact age</p>

<!-- 🔥 Adsterra Top -->
<div class="ad-box">
<!-- Paste Adsterra Banner Code -->
<p>Ad Space</p>
</div>

<input type="date" id="dob">

<button onclick="calculateAge()">Calculate Age 📊</button>

<div class="loader" id="loader">Calculating your age... ⏳</div>

<div class="result" id="result"></div>

<!-- 🔥 Monetag Unlock -->
<div class="ad-box">
<button onclick="goAd()">Unlock Detailed Analysis 🔥</button>
</div>

<!-- 🔥 Adsterra Bottom -->
<div class="ad-box">
<!-- Paste Adsterra Native / Social Bar -->
<p>Ad Space</p>
</div>

</div>

<div class="footer">
<p>© 2026 ViralTools | All Rights Reserved</p>
</div>

<script>
function calculateAge(){
    let dob = document.getElementById("dob").value;

    if(dob===""){
        alert("Please select your date of birth!");
        return;
    }

    document.getElementById("loader").style.display="block";

    setTimeout(()=>{
        document.getElementById("loader").style.display="none";

        let birthDate = new Date(dob);
        let today = new Date();

        let years = today.getFullYear() - birthDate.getFullYear();
        let months = today.getMonth() - birthDate.getMonth();
        let days = today.getDate() - birthDate.getDate();

        if(days < 0){
            months--;
            days += 30;
        }

        if(months < 0){
            years--;
            months += 12;
        }

        document.getElementById("result").innerHTML =
        "🎉 Your Age:<br><br>" +
        "<b>"+years+"</b> Years, <b>"+months+"</b> Months, <b>"+days+"</b> Days";
        
    },2000);
}

/* 🔥 Monetag Redirect */
function goAd(){
    window.location.href="YOUR_MONETAG_LINK";
}
</script>

</body>
</html>
